<div class="login-container">

  <mat-card class="login-card">

    <h1>Loan Management</h1>

    <p class="subtitle">
      Ingrese sus credenciales
    </p>

    <mat-form-field appearance="outline">
      <mat-label>Usuario</mat-label>

      <input
        matInput
        [(ngModel)]="username">

      <mat-icon matSuffix>
        person
      </mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Contraseña</mat-label>

      <input
        matInput
        type="password"
        [(ngModel)]="password">

      <mat-icon matSuffix>
        lock
      </mat-icon>

    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      (click)="login()">

      Iniciar sesión

    </button>

  </mat-card>

</div>
