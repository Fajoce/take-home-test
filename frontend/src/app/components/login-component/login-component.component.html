<div class="login-container">

  <div class="login-card">

    <h1>Loan Management</h1>

    <p class="subtitle">
      Sign in to continue
    </p>

    <div class="form-group">

      <label>Username</label>

      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username">

    </div>

    <div class="form-group">

      <label>Password</label>

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password">

    </div>

    <button
      class="login-btn"
      (click)="login()">

      Login

    </button>

  </div>

</div>
